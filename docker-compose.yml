version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: casalperfeito_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: casalperfeito
      POSTGRES_PASSWORD: casalperfeito_secret
      POSTGRES_DB: casalperfeito
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
